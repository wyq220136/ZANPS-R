exit_log_jsonl_path: ""
auto_resume: true

# Training schedule.
epochs: 20
iterations: 5
lr: 0.0001
weight_decay: 0.0001
log_every: 10
disable_tqdm: false
seed: 42

# Dataloader.
batch_size: 1
batch_size_per_rank: ""
num_workers: 0
num_workers_per_rank: ""
pin_memory: true
persistent_workers: true

# Reconstruction prebuild.
prebuild_recon: true
prebuild_split: "both"
recon_num_workers: 0
recon_num_workers_per_rank: ""
recon_persistent_workers: false
force_rebuild_recon: false
force_resample_recon: false
use_real_depth_pointmap: true
recon_min_views_per_part: 3
recon_max_views_per_part: 5
recon_rot_threshold_deg: 15.0
recon_trans_threshold: 0.05
recon_model: "sam3d"
recon_view_density_scale: 1.5

# Hunyuan3D backend.
hunyuan_model_path: "/inspire/hdd/project/robot-dna/jiangyixuan-CZXS25230137/yuquan/Hunyuan3D-2.1/ckpts"
hunyuan_subfolder: "hunyuan3d-dit-v2-1"
hunyuan_num_inference_steps: 50
hunyuan_octree_resolution: 384
hunyuan_guidance_scale: 5.5

# InstantMesh backend.
instantmesh_root: "/inspire/hdd/project/robot-dna/jiangyixuan-CZXS25230137/yuquan/InstantMesh"
