dataset_root: "/inspire/hdd/project/robot-dna/jiangyixuan-CZXS25230137/yuquan/dataset_train"
train_subdir: "train"
val_subdir: "val"
recon_cache_root: "/inspire/hdd/project/robot-dna/jiangyixuan-CZXS25230137/yuquan/dataset_train_recon_cache"
sam3d_project_root: "/inspire/hdd/project/robot-dna/jiangyixuan-CZXS25230137/yuquan/sam-3d-objects"
sam3d_notebook_root: "/inspire/hdd/project/robot-dna/jiangyixuan-CZXS25230137/yuquan/sam-3d-objects/notebook"
sam3d_config_path: null
min_mask_pixels: 32
depth_scale: 1000.0

# Refiner config (model architecture/training conventions).
config: null

# Checkpoint/output paths.
