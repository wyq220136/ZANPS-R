# Trainable modules.
train_pose_backbone: false
train_adapters: false

# Loss and utility settings.
soft_alpha: 8.0
soft_gamma: 2.0
soft_delta: 1.0
aux_bce_weight: 0.02
pose_utility_scale: 10.0
vm_weight: 0.75

# Early stopping.
early_stop_patience: 10
early_stop_min_delta: 0.000001

# Checkpoint naming. If false, vm_weight tag is appended to out_dir and ckpt names.
disable_vm_weight_naming: false

# torchrun fallback.
backend: "nccl"
master_addr: "127.0.0.1"
master_port: 29500
world_size: 1
rank: 0
local_rank: 0
